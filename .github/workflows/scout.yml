name: MarketScout Discovery

on:
  schedule:
    # Every 15 minutes — real-time opportunity monitoring
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  scan:
    name: MarketScout Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --ignore-scripts
      
      - name: Run MarketScout scan
        run: node src/scheduler/scheduler.js
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ALERT_THRESHOLD: ${{ secrets.ALERT_THRESHOLD || '6.0' }}
      
      - name: Commit updated reports
        run: |
          git config --local user.email "marketscout@github.com"
          git config --local user.name "MarketScout Bot"
          
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add alerts/ data/
            git commit -m "chore: MarketScout scan $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
